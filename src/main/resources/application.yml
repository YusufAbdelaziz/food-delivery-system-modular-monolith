spring:
  application:
    name: foodDeliverySystem
  profiles:
    active: dev
  modulith:
    events:
      republish-outstanding-events-on-restart: true
      completion-mode: archive
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
          ssl:
            protocols: TLSv1.2
